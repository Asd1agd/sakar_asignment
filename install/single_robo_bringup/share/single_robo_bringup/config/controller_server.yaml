controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath", "MPPI"]
    odom_topic: /odom

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    # Goal checker parameters
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.35
      stateful: True
    
    # PD Motion Planner parameters
    # FollowPath:
    #   plugin: "bumperbot_motion::PDMotionPlanner"
    #   kp: 2.0
    #   kd: 0.1
    #   max_linear_velocity: 0.3
    #   max_angular_velocity: 1.0
    #   step_size: 0.1

    # Pure Pursuit parameters
    # PurePursuit:
    #   plugin: "bumperbot_motion::PurePursuit"
    #   look_ahead_distance: 0.5
    #   max_linear_velocity: 0.3
    #   max_angular_velocity: 1.0
    
    # RPP parameters
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.3
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.8
      transform_tolerance: 0.2
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 1.0
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 1.0
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 3.2
      max_robot_pose_search_dist: 10.0
      interpolate_curvature_after_goal: false
      cost_scaling_dist: 0.3
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 3.0

    MPPI:
      plugin: "nav2_mppi_controller::MPPIController"

      # === Core MPPI Settings ===
      time_steps: 60
      model_dt: 0.05
      batch_size: 2000
      iteration_count: 1

      # === Velocity Limits ===
      vx_max: 0.8
      vx_min: -0.2        # IMPORTANT: allow reverse
      vy_max: 0.0
      wz_max: 2.0

      # === Noise Sampling Std Dev ===
      vx_std: 0.2
      vy_std: 0.0
      wz_std: 0.5

      # === Optimization Parameters ===
      temperature: 0.3
      gamma: 0.015
      prune_distance: 1.7
      transform_tolerance: 0.2
      motion_model: "DiffDrive"

      visualize: false

      # === CRITICS (IMPORTANT PART) ===
      critics: [
        "ObstaclesCritic",
        "GoalCritic",
        "GoalAngleCritic",
        "PathAlignCritic",
        "PathFollowCritic",
        "PreferForwardCritic"
      ]

      ObstaclesCritic:
        cost_power: 1
        cost_weight: 4.0

      GoalCritic:
        cost_power: 1
        cost_weight: 10.0

      GoalAngleCritic:
        cost_power: 1
        cost_weight: 15.0

      PathAlignCritic:
        cost_power: 1
        cost_weight: 14.0

      PathFollowCritic:
        cost_power: 1
        cost_weight: 5.0

      PreferForwardCritic:
        cost_power: 1
        cost_weight: 15.0



local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: true
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      robot_radius: 0.2
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      always_send_full_costmap: True